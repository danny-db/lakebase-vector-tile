command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
env:
  - name: LAKEBASE_HOST
    value: "<YOUR_LAKEBASE_ENDPOINT_HOST>"
  - name: LAKEBASE_PORT
    value: "5432"
  - name: LAKEBASE_DATABASE
    value: "databricks_postgres"
  - name: LAKEBASE_SCHEMA
    value: "geo"
  - name: LAKEBASE_USER
    value: "<YOUR_APP_ROLE>"
  - name: LAKEBASE_PASSWORD
    value: "<YOUR_APP_ROLE_PASSWORD>"
